id: feedspot-feedfetcher
name: Feedspot
operator:
  name: Feedspot
  url: "https://www.feedspot.com/"
description: >-
  Feedspot is a hosted content reader and feed aggregation service. Its bot
  fetches RSS and Atom feeds and web content on behalf of Feedspot users.
docs:
  - "https://www.feedspot.com/fs/bot"
category: feed-fetcher
user_agents:
  patterns:
    - 'Feedspot'
  instances:
    - 'Mozilla/5.0 (compatible; Feedspotbot/1.0; +http://www.feedspot.com/fs/bot)'
    - 'Mozilla/5.0 (compatible; Feedspot/1.0 (+https://www.feedspot.com/fs/fetcher; like FeedFetcher-Google)'
behavior: { respects_robots_txt: false }
verification: []
