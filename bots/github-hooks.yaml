id: github-hooks
name: GitHub Webhooks
operator: { name: GitHub, url: "https://github.com" }
description: >-
  GitHub's webhook delivery service. Not a crawler; sends repository and
  organization event notifications to configured endpoints from IP ranges
  published in GitHub's meta API.
docs:
  - "https://docs.github.com/en/rest/meta/meta"
category: webhook
user_agents:
  patterns:
    - 'GitHub-Hookshot/[0-9a-f]+'
  instances:
    - 'GitHub-Hookshot/044aa46'
behavior: { respects_robots_txt: false }
verification:
  - type: cidr_feed
    url: "https://api.github.com/meta"
    format: github_meta
    selector: hooks
