id: chatgpt-user
name: ChatGPT-User
operator: { name: OpenAI, url: "https://openai.com" }
description: >-
  OpenAI's user-triggered fetcher, used when a ChatGPT user or a GPT Action
  asks the assistant to visit a specific page. It does not crawl autonomously.
docs:
  - "https://developers.openai.com/api/docs/bots"
category: ai-assistant
user_agents:
  patterns:
    - 'ChatGPT-User/\d'
  instances:
    - 'Mozilla/5.0 AppleWebKit/537.36 (KHTML, like Gecko); compatible; ChatGPT-User/1.0; +https://openai.com/bot'
behavior: { respects_robots_txt: false, robots_token: ChatGPT-User }
verification:
  - type: cidr_feed
    url: "https://openai.com/chatgpt-user.json"
    format: prefixes
