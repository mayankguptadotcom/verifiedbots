id: seekport
name: SeekportBot
operator: { name: SISTRIX, url: "https://www.sistrix.com" }
description: >-
  The crawler for the Seekport search engine, operated by SISTRIX (Bonn,
  Germany). It fetches pages to build Seekport's search index and follows the
  Disallow directives in robots.txt.
docs:
  - "https://bot.seekport.com"
category: search-engine
user_agents:
  patterns:
    - 'SeekportBot'
  instances:
    - 'Mozilla/5.0 (compatible; SeekportBot; +https://bot.seekport.com)'
behavior: { respects_robots_txt: true, robots_token: SeekportBot }
verification:
  - type: cidr_feed
    url: "https://bot.seekport.com/seekportbot_ips.txt"
    format: text_lines
