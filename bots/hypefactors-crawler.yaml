id: hypefactors-crawler
name: Buck
operator: { name: Hypefactors, url: "https://hypefactors.com" }
description: >-
  Buck is Hypefactors' media-monitoring crawler. It discovers and indexes web
  pages by following links, gathering publicly available content for the
  company's media-monitoring platform. It identifies itself and respects
  robots.txt.
docs:
  - "https://app.hypefactors.com/media-monitoring/about.html"
category: monitoring
user_agents:
  patterns:
    - 'Buck\/'
  instances:
    - 'Buck/2.2; (+https://app.hypefactors.com/media-monitoring/about.html)'
behavior: { respects_robots_txt: true }
verification: []
