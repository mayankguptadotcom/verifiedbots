id: internet-archive
name: archive.org_bot
operator: { name: Internet Archive, url: "https://archive.org" }
description: >-
  The Internet Archive's Heritrix-based crawler used for its wide crawl of
  the web, feeding the Wayback Machine. The Archive says it crawls slowly to
  avoid disrupting sites and publishes no IP ranges. Its help pages note that
  robots exclusions may prevent archiving, but the operator does not document
  a commitment to obey robots.txt across its crawls.
docs:
  - "https://archive.org/details/archive.org_bot"
  - "https://help.archive.org/help/wayback-machine-general-information/"
category: archiver
user_agents:
  patterns:
    - 'archive\.org_bot'
    - 'ia_archiver'
  instances:
    - 'Mozilla/5.0 (compatible; archive.org_bot +http://archive.org/details/archive.org_bot)'
    - 'Mozilla/5.0 (compatible; archive.org_bot +http://www.archive.org/details/archive.org_bot)'
    - 'Mozilla/5.0 (compatible; special_archiver/3.1.1 +http://www.archive.org/details/archive.org_bot)'
    - 'ia_archiver-web.archive.org'
behavior: { respects_robots_txt: false }
verification: []
