id: perplexity-user
name: Perplexity-User
operator: { name: Perplexity, url: "https://www.perplexity.ai" }
description: >-
  Perplexity's user-triggered fetcher, used when a user's question requires
  visiting a specific web page to produce an accurate answer.
docs:
  - "https://docs.perplexity.ai/docs/resources/perplexity-crawlers"
category: ai-assistant
user_agents:
  patterns:
    - 'Perplexity-User/\d'
  instances:
    - 'Mozilla/5.0 AppleWebKit/537.36 (KHTML, like Gecko; compatible; Perplexity-User/1.0; +https://perplexity.ai/perplexity-user)'
behavior: { respects_robots_txt: false, robots_token: Perplexity-User }
verification:
  - type: cidr_feed
    url: "https://www.perplexity.com/perplexity-user.json"
    format: prefixes
