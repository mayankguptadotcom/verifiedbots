id: theoldreader
name: The Old Reader
operator: { name: "The Old Reader", url: "https://www.theoldreader.com" }
description: >-
  The Old Reader's feed-fetching bot, which polls RSS/Atom feeds that its
  users have subscribed to. The service publishes no fixed IP range or
  verification recipe for the fetcher.
docs:
  - "https://www.theoldreader.com/"
category: feed-fetcher
user_agents:
  patterns:
    - 'theoldreader\.com'
  instances:
    - 'Mozilla/5.0 (compatible; theoldreader.com)'
behavior: { respects_robots_txt: false }
verification: []
