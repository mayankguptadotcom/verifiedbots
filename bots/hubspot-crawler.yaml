id: hubspot-crawler
name: HubSpot Crawler
operator: { name: HubSpot, url: "https://www.hubspot.com" }
description: >-
  HubSpot's crawler, which fetches customer and external pages to power the SEO
  recommendations and link analysis in HubSpot's marketing tools. HubSpot
  publishes its egress ranges tagged by service, including web crawling.
docs:
  - "https://knowledge.hubspot.com/seo/understand-seo-crawling-errors"
  - "https://developers.hubspot.com/docs/api-reference/latest/account/ip-ranges/guide"
category: seo
user_agents:
  patterns:
    - 'HubSpot (Crawler|Webcrawler)'
  instances:
    - 'Mozilla/5.0 (compatible; HubSpot Crawler; web-crawlers@hubspot.com)'
behavior: { respects_robots_txt: true, robots_token: HubSpot Crawler }
verification:
  # HubSpot's ip-ranges API returns objects tagged by service; these are the
  # entries with service == WEB_SCRAPING ("Web crawling and user-generated
  # traffic") from https://api.hubapi.com/meta/network-origins/2026-03/ip-ranges
  - type: static_cidrs
    cidrs:
