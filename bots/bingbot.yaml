id: bingbot
name: Bingbot
operator: { name: Microsoft, url: "https://www.microsoft.com" }
description: >-
  Microsoft's primary web crawler, fetching pages for Bing Search indexing.
docs:
  - "https://www.bing.com/webmasters/help/which-crawlers-does-bing-use-8c184ec0"
category: search-engine
user_agents:
  patterns:
    - 'bingbot/\d'
  instances:
    - 'Mozilla/5.0 AppleWebKit/537.36 (KHTML, like Gecko; compatible; bingbot/2.0; +http://www.bing.com/bingbot.htm) Safari/537.36'
    - 'Mozilla/5.0 (compatible; bingbot/2.0; +http://www.bing.com/bingbot.htm)'
behavior: { respects_robots_txt: true, robots_token: bingbot }
verification:
  - type: cidr_feed
    url: "https://www.bing.com/toolbox/bingbot.json"
    format: prefixes
  - type: rdns
    masks: ["*.search.msn.com"]
