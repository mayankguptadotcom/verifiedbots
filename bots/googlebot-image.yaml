id: googlebot-image
name: Googlebot Image
operator: { name: Google, url: "https://www.google.com" }
description: >-
  Google's image crawler, which fetches images for Google Images and image
  features in Search. It is a distinct crawler from Googlebot with its own
  robots.txt token, though rules for Googlebot also apply to it.
docs:
  - "https://developers.google.com/crawling/docs/crawlers-fetchers/google-common-crawlers"
category: search-engine
user_agents:
  patterns:
    - 'Googlebot-Image/\d'
  instances:
    - 'Googlebot-Image/1.0'
behavior: { respects_robots_txt: true, robots_token: Googlebot-Image }
verification:
  - type: cidr_feed
    url: "https://developers.google.com/static/crawling/ipranges/common-crawlers.json"
    format: prefixes
  - type: rdns
    masks: ["*.googlebot.com", "*.geo.googlebot.com"]
