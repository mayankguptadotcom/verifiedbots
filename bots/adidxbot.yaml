id: adidxbot
name: AdIdxBot
operator: { name: Microsoft, url: "https://www.microsoft.com" }
description: >-
  Microsoft's crawler for Bing Ads / Microsoft Advertising. It crawls ads and
  follows through to the advertised landing pages for quality control, with
  both desktop and mobile variants.
docs:
  - "https://www.bing.com/webmasters/help/which-crawlers-does-bing-use-8c184ec0"
  - "https://www.bing.com/webmasters/help/verify-bingbot-2195837f"
category: search-engine
user_agents:
  patterns:
    - 'adidxbot/\d'
  instances:
    - 'Mozilla/5.0 (compatible; adidxbot/2.0; +http://www.bing.com/bingbot.htm)'
    - 'Mozilla/5.0 (iPhone; CPU iPhone OS 7_0 like Mac OS X) AppleWebKit/537.51.1 (KHTML, like Gecko) Version/7.0 Mobile/11A465 Safari/9537.53 (compatible; adidxbot/2.0; +http://www.bing.com/bingbot.htm)'
behavior: { respects_robots_txt: true }
verification:
  - type: rdns
    masks: ["*.search.msn.com"]
