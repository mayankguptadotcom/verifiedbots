id: marginalia
name: Marginalia
operator: { name: Marginalia Search, url: "https://www.marginalia.nu" }
description: >-
  The crawler behind Marginalia Search, an independent search engine focused
  on older, text-heavy, and non-commercial web pages. Identifies itself by a
  bare URL rather than a conventional bot token.
docs:
  - "https://about.marginalia-search.com/article/crawler/"
category: search-engine
user_agents:
  patterns:
    - 'search\.marginalia\.nu'
  instances:
    - 'search.marginalia.nu'
behavior: { respects_robots_txt: true, robots_token: "search.marginalia.nu" }
verification:
  - type: cidr_feed
    url: "https://search.marginalia.nu/crawler-ips.txt"
    format: text_lines
