id: yandexbot
name: YandexBot
operator: { name: Yandex, url: "https://yandex.com" }
description: >-
  Yandex's primary web crawler, fetching pages for Yandex Search indexing.
docs:
  - "https://yandex.com/support/webmaster/robot-workings/check-yandex-robots.html"
category: search-engine
user_agents:
  patterns:
    - 'YandexBot/\d'
  instances:
    - 'Mozilla/5.0 (compatible; YandexBot/3.0; +http://yandex.com/bots)'
    - 'Mozilla/5.0 (compatible; YandexBot/3.0; MirrorDetector; +http://yandex.com/bots)'
behavior: { respects_robots_txt: true, robots_token: YandexBot }
verification:
  - type: rdns
    masks: ["*.yandex.ru", "*.yandex.net", "*.yandex.com"]
