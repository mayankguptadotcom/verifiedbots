id: bingpreview
name: BingPreview
operator: { name: Microsoft, url: "https://www.microsoft.com" }
description: >-
  Microsoft fetcher used to generate page snapshots for previews in Bing
  search results. Runs both desktop and mobile variants.
docs:
  - "https://www.bing.com/webmasters/help/which-crawlers-does-bing-use-8c184ec0"
  - "https://www.bing.com/webmasters/help/verify-bingbot-2195837f"
category: search-engine
user_agents:
  patterns:
    - 'BingPreview/\d'
  instances:
    - 'Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/534+ (KHTML, like Gecko) BingPreview/1.0b'
    - 'Mozilla/5.0 (Windows Phone 8.1; ARM; Trident/7.0; Touch; rv:11.0; IEMobile/11.0; NOKIA; Lumia 530) like Gecko BingPreview/1.0b'
behavior: { respects_robots_txt: true }
verification:
  - type: rdns
    masks: ["*.search.msn.com"]
