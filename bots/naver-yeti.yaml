id: naver-yeti
name: Yeti
operator: { name: Naver, url: "https://www.naver.com" }
description: >-
  Naver's web crawler, fetching pages for Naver Search indexing across South
  Korea's largest search engine.
docs:
  - "https://searchadvisor.naver.com/guide/seo-basic-firewall"
category: search-engine
user_agents:
  patterns:
    - 'Yeti/\d'
  instances:
    - 'Mozilla/5.0 (compatible; Yeti/1.1; +http://naver.me/spd)'
    - 'Mozilla/5.0 AppleWebKit/537.36 (KHTML, like Gecko; compatible; Yeti/1.1; +https://naver.me/spd) Chrome/106.0.5249.0 Safari/537.36'
behavior: { respects_robots_txt: true, robots_token: Yeti }
verification:
  - type: rdns
    masks: ["*.naver.com"]
