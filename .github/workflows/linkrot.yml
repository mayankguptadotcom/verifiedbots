name: linkrot
# Weekly check that the STATIC docs URLs the daily feed build never touches are
# still alive. Report-only: it opens/refreshes a single issue when a docs page
# is gone (404/410/DNS failure); it never blocks anything.
on:
  schedule:
    - cron: '23 5 * * 1' # Mondays 05:23 UTC
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  linkrot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - name: Check docs URLs (exit 2 = dead links found)
        id: check
        run: |
          set +e
          npm run check-docs 2>&1 | tee docs-report.txt
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -eq 2 ]; then echo "dead=true" >> "$GITHUB_OUTPUT"; elif [ "$code" -ne 0 ]; then exit "$code"; fi
      - name: Open or update stale-docs issue
        if: steps.check.outputs.dead == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="$(printf 'The weekly link-rot check found docs URLs that appear dead (404/410/unreachable). Re-source or drop the affected bots.\n\n```\n%s\n```\n' "$(cat docs-report.txt)")"
          existing=$(gh issue list --label stale-docs --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "Stale docs: $(date -u +%F)" --label stale-docs --body "$body" \
              || gh issue create --title "Stale docs: $(date -u +%F)" --body "$body"
          fi
