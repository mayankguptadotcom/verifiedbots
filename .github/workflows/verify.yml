name: verify
on:
  pull_request:
  push:
    branches: [main]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run validate
      - name: Web Bot Auth key directories
        run: npm run verify-wba
      - name: Live feed verification
        run: npm run fetch-feeds

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - name: Build artifacts (exit 2 = LKG-published, fine for the site)
        run: npm run build:artifacts || [ $? -eq 2 ]
      - run: npm --prefix site ci
      - run: npm --prefix site test
      - run: npm --prefix site run build
      - run: npm --prefix site run smoke
